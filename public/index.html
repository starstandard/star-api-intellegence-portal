<!DOCTYPE html>
<html>
<head>
<title>STAR V4</title>
<style>
body{background:#0b0f1a;color:white;font-family:sans-serif}
button{padding:10px;margin:5px;background:#1e2a44;color:white;border:none}
</style>
</head>
<body>

<h2>STAR API Intelligence V4</h2>

<textarea id="q" style="width:100%;height:100px"></textarea><br>
<button onclick="ask()">Ask</button>

<h3>Answer</h3>
<div id="a"></div>

<h3>Business Capabilities</h3>
<div id="cards"></div>

<script>
async function ask(){
  const q=document.getElementById('q').value;
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q})});
  const data=await res.json();

  document.getElementById('a').innerText=data.answer||'';

  const c=document.getElementById('cards');
  c.innerHTML='';
  (data.capability_cards||[]).forEach(x=>{
    const b=document.createElement('button');
    b.innerText=x.title;
    b.onclick=()=>{document.getElementById('q').value=x.prompt};
    c.appendChild(b);
  });
}
</script>

</body>
</html>
